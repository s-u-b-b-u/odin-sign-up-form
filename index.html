<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./styles.css">
    <title>Sign-up Page</title>
</head>
<body>
    <div class=" image-container">
        <img src="./assets/halie-west-25xggax4bSA-unsplash.jpg" alt="scenary">
        <div><img src="./assets/odin-lined.png" alt="odin-logo" id="odin-logo"><span>ODIN</span></div>
        <p>Photo by <a href="https://unsplash.com/@haliewestphoto?utm_source=unsplash&utm_medium=referral&utm_content=creditCopyText">Halie West</a> on <a href="https://unsplash.com/photos/green-leaf-plant-in-close-up-photography-25xggax4bSA?utm_source=unsplash&utm_medium=referral&utm_content=creditCopyText">Unsplash</a>
      </p>
    </div>
    <div class="main content-container">
        <div class="content">
            <div class="intro"> 
                <p>This is not a real online service! You know you need something like this in your life to help you realize your deepest dreams. Sign up <em>now</em> to get started.</p>
                <p>You <em>know</em> you want to.</p>
            </div>
            <div class="form-container">
                <form action="#" id="form-a">
                    <fieldset>
                        <legend>Let's do this</legend>
                        <p>
                            <label for="fname">FIRST NAME</label>
                            <input type="text" name="fname" id="fname"> 
                        </p>
                        <p>
                            <label for="lname">LAST NAME</label>
                            <input type="text" name="lname" id="lname"> 
                        </p>
                        <p>
                            <label for="email">EMAIL</label>
                            <input type="email" name="email" id="email"> 
                        </p>
                        <p>
                            <label for="phone-nbr">PHONE NUMBER</label>
                            <input type="tel" name="phone-number" id="phone-nbr"> 
                        </p>
                        <p>
                            <label for="password">PASSWORD</label>
                            <input type="password" name="password" id="password" minlength="6"> 
                        </p>
                        <p>
                            <label for="confirm-pswd">CONFIRM PASSWORD</label>
                            <input type="password" name="lname" id="confirm-pswd" minlength="6"> 
                        </p>
                    </fieldset>
                </form>
            </div>
            <div class="submit">
                <button type="submit" form="form-a" id="submit-button">Create Account </button>
                <p>Already have an account? <a href=".login">Log in</a></p>
            </div>
        </div>
    </div>
</body>
</html>
